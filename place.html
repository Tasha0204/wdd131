<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perú - Página de lugar</title>
    <meta name="description" content="Página de información sobre Lima, Perú para el curso WDD 230. Incluye datos geográficos, clima actual y cálculo de sensación térmica.">
    <meta name="author" content="Tasha Vidal">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css" media="(min-width: 1000px)">
    <script src="scripts/place.js" defer></script>
</head>
<body>
    <header>
        <h1>Lima - Perú</h1>
    </header>
    <main class="container">
        <div class="hero-section">
            <picture class="hero">
                <source media="(min-width: 1000px)" srcset="images/limaclima.webp">
                <source media="(min-width: 620px)" srcset="images/limaclima.webp">
                <img src="images/limaclima.webp" alt="Paisaje de Lima, Perú" loading="lazy">
            </picture>
        </div>

        <section class="data">
            <h2 class="label-box">Datos Generales</h2>
            <table>
                 <tr><td class="label">Area:</td><td>2,672 km²</td></tr>
                 <tr><td class="label">Population:</td><td>10.2 Million</td></tr>
                 <tr><td class="label">Capital:</td><td>Lima</td></tr>
                 <tr><td class="label">Languages:</td><td>Spanish</td></tr>
                 <tr><td class="label">Currency:</td><td>Sol (PEN)</td></tr>
                 <tr><td class="label">Time Zone:</td><td>PET (UTC-5)</td></tr>
                 <tr><td class="label">Calling Code:</td><td>+51 1</td></tr>
                 <tr><td class="label">Internet TLD:</td><td>.pe</td></tr>
            </table>
        </section>

        <section class="weather">
            <h2 class="label-box">Clima <span class="weather-icon"></span></h2>
            <img src="images/icono-del-clima.svg" alt="Icono del tiempo" class="weather-svg">
            <table>
                <tr><td class="label">Temperature:</td><td><span id="temp">19</span> °C</td></tr>
                <tr><td class="label">Conditions:</td><td>Mist / Humidity</td></tr>
                <tr><td class="label">Wind:</td><td><span id="wind">14</span> km/h</td></tr>
                <tr><td class="label">Wind Chill:</td><td><span id="windchill"></span></td></tr>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy;<span id="currentyear"></span> 🌸 Tasha Vidal 🌸 Lima, Perú</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
