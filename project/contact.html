<body>
    <header>
        <img src="images/logo.png" alt="Logo Tasha Vidal" width="354" height="354">
        <button id="menu"></button>
        <nav class="navigation">
            <a href="../project/index.html">Home</a>

    <main class="container-contact">
        <section class="contact-box">
            <div class="image-container">
                <img src="images/contac.jpg" alt="Image showing teamwork">
            </div>
            <div class="form-container">
                <form action="../project/my-handling-form-page" method="post">
                    <h1>Contact us</h1>
                    <ul>
                        <li>
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="user_name" required>
                        </li>
                        <li>
                            <label for="mail">Email:</label>
                            <input type="email" id="mail" name="user_email" required>
                        </li>
                        <li>
                            <label for="msg">Message:</label>
                            <textarea id="msg" name="user_message" required></textarea>
                        </li>
                        <li>
                            <button type="submit">Send your message</button>
                        </li>
                    </ul>
                </form>
            </div>
            <div class="final-contact">
                <h2>Web development for the modern world</h2>
                <p>Ready to bring your project to life? Contact me to discuss your ideas!</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy;<span id="currentyear">2026</span> 🌸 Tasha Vidal 🌸 Lima, Perú</p>

        </div>
    </footer>
