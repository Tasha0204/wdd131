<!DOCTYPE html>
<html lang="es">
<head>

    <title>A&S - Lazy Loading</title>
    <link rel="stylesheet" href="lazyload.css">
</head>
<body>
    <main>
        <h1>Galería de Imágenes A&S</h1>
        <img src="https://picsum.photos/400/600?random=1" alt="Imagen 1" loading="lazy">

        <img src="https://picsum.photos/400/600?random=5" alt="Imagen 5" loading="lazy">
        <img src="https://picsum.photos/400/600?random=6" alt="Imagen 6" loading="lazy">
    </main>
    <footer>
        <p>&copy; 2026 A&S Solutions. Última modificación: <span id="lastModified"></span></p>
    </footer>
    <script src="lazyload.js"></script>

</html>
